services:
  # PostgreSQL Database - Core service required for VCBench
  db:
    container_name: wgs_db
    image: postgres:16-alpine
    platform: linux/amd64  # Specify platform for M1/M2 Macs
    environment:
      POSTGRES_DB: wgs
      POSTGRES_USER: wgs_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-55433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wgs_user -d wgs"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # bcftools - on-demand container for ad-hoc VCF manipulation.
  # The application uses the local `bcftools` binary (see setup_environment.sh);
  # this service is only started under the `tools` profile, e.g.:
  #   docker compose --profile tools run --rm bcftools bcftools view file.vcf.gz
  bcftools:
    image: biocontainers/bcftools:v1.9-1-deb_cv1
    platform: linux/amd64  # Specify platform for M1/M2 Macs
    volumes:
      - ../:/wgs
    working_dir: /wgs
    profiles: ["tools"]

  # MultiQC - on-demand container for QC report aggregation. Not used by the
  # application; kept here for ad-hoc invocations under the `tools` profile:
  #   docker compose --profile tools run --rm multiqc multiqc /wgs/data
  multiqc:
    image: multiqc/multiqc:v1.19
    platform: linux/amd64  # Specify platform for M1/M2 Macs
    volumes:
      - ../:/wgs
    working_dir: /wgs
    profiles: ["tools"]

  # RTG Tools - Comment out until Dockerfile.rtg is properly configured
  # rtg:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.rtg
  #   image: rtg-tools
  #   platform: linux/amd64
  #   mem_limit: 8g
  #   memswap_limit: 10g
  #   volumes:
  #     - ../:/wgs
  #   environment:
  #     - RTG_MEM=6g
  #   working_dir: /wgs
  #   entrypoint: [ "rtg" ]

  # hap.py - Comment out until proper image is available
  # happy:
  #   image: pkrusche/hap.py:latest
  #   platform: linux/amd64
  #   mem_limit: 48g
  #   memswap_limit: 56g
  #   volumes:
  #     - ../:/wgs
  #   environment:
  #     - RTG_MEM=24g
  #   working_dir: /wgs
  #   entrypoint: [ "python", "/opt/hap.py/bin/hap.py" ]

volumes:
  db-data:
  
